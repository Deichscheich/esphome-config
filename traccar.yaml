esphome:
  name: car-tracker
  friendly_name: car-tracker
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "zAp1dOC8x2maPwT3fvGHx0/F2zDGDWXoP/30gFdXMXA="

ota:
  - platform: esphome
    password: "abbf4584d79c46c074355f0366a0052d"


# ─── CUSTOM COMPONENT (trip logger state machine) ─────────────
external_components:
  - source:
      type: local
      path: components
    components: [ trip_logger ]

# ─── I2C for QMI8658 & AXP2101 ────────────────────────────────
i2c:
  sda: 17
  scl: 18
  scan: true
  frequency: 400kHz

# ─── IMU ──────────────────────────────────────────────────────
qmi8658:
  address: 0x6B
  accel_standard_deviation:
    name: "Motion Magnitude"
    id: motion_magnitude
    on_value:
      then:
        - lambda: id(trip_state).on_motion($x);

# ─── GPS ──────────────────────────────────────────────────────
uart:
  - id: gps_uart
    tx_pin: 43
    rx_pin: 44
    baud_rate: 9600

gps:
  uart_id: gps_uart
  id: gps_module

sensor:
  - platform: gps
    latitude:
      name: "GPS Latitude"
      id: gps_lat
    longitude:
      name: "GPS Longitude"
      id: gps_lon
    speed:
      name: "GPS Speed"
      id: gps_speed
    altitude:
      name: "GPS Altitude"
      id: gps_alt
    course:
      name: "GPS Course"
      id: gps_course

# ─── DEEP SLEEP ───────────────────────────────────────────────
deep_sleep:
  id: deep_sleep_ctrl
  sleep_duration: 30s
  wakeup_pin:
    number: 21           # QMI8658 INT1 on some revs
    allow_any: true
  run_duration:
    default: 15s
    maximum: 3600s

# ─── SD CARD (SPI) ────────────────────────────────────────────
spi:
  clk_pin: 14
  mosi_pin: 11
  miso_pin: 2

sd_mmc_card:
  id: sd_card
  mode_1bit: false
  spi_mode: true
  cs_pin: 13

# ─── TRIP LOGGER CUSTOM COMPONENT ─────────────────────────────
trip_logger:
  id: trip_state
  sd_card_id: sd_card
  gps_lat_id: gps_lat
  gps_lon_id: gps_lon
  gps_speed_id: gps_speed
  gps_alt_id: gps_alt
  gps_course_id: gps_course
  motion_threshold: 0.6
  stop_timeout: 120s
  log_interval: 3s
  wifi_ssid: "YourHomeWiFi"
  wifi_password: "YourPassword"
  upload_url: "http://192.168.1.100:5055/"
  device_id: "car-tracker-01"

# ─── WEB SERVER (optional, nice for debugging) ────────────────
web_server:
  port: 80
  auth:
    username: admin
    password: "web_password_here"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Traccar Fallback Hotspot"
    password: "YzwSimsypc3F"